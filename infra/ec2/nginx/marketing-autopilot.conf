# Marketing Autopilot dev — nginx (HTTP; certbot adds HTTPS)
# EC2: Kids Guard Prod 54.206.252.93 — does NOT modify kids-guard.conf

upstream marketing_autopilot_api {
    server 127.0.0.1:3002;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name myreceipt.website www.myreceipt.website api.myreceipt.website;

    client_max_body_size 16m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://marketing_autopilot_api;
    }
}
